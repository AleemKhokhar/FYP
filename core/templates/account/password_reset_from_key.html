{% load static %}
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Set New Password - GamerTracker</title>
    <link rel="stylesheet" href="{% static 'css/style.css' %}?v=1.1">
    <style>
        input[type="password"] {
            width: 100%;
            background: rgba(0,0,0,0.2);
            border: 1px solid rgba(255, 255, 255, 0.1);
            border-radius: 12px;
            padding: 15px;
            color: white;
            font-family: inherit;
            margin-bottom: 15px;
        }
        label {
            display: block;
            color: #00ff88;
            text-transform: uppercase;
            font-size: 0.75rem;
            letter-spacing: 2px;
            margin-bottom: 10px;
            font-weight: 800;
        }
        .helptext, ul.errorlist {
            font-size: 0.75rem;
            color: rgba(255, 255, 255, 0.6);
            list-style: none;
            padding: 0;
            margin-bottom: 15px;
        }
        ul.errorlist {
            color: #ff4444;
        }
    </style>
</head>
<body>
    <nav class="navbar">
        <div class="nav-container">
            <a href="{% url 'home' %}" class="logo">Gamer<span>Tracker</span></a>
        </div>
    </nav>

    <div class="container" style="display: flex; justify-content: center; align-items: center; min-height: 80vh;">
        <div class="hero-section" style="max-width: 450px; width: 100%; padding: 50px 40px;">
            <h1 style="margin-bottom: 10px;">New <span>Password</span></h1>
            
            {% if token_fail %}
                <p style="color: #ff4444; margin-bottom: 30px;">This reset link is invalid or has expired.</p>
                <div class="signup-link-wrapper" style="border-top: none; padding-top: 0; text-align: center;">
                    <a href="{% url 'account_reset_password' %}" class="signup-link">
                        <span>Request a new link</span>
                    </a>
                </div>
            {% else %}
                <p style="color: rgba(255, 255, 255, 0.6); margin-bottom: 30px;">Enter your new secure password below.</p>
                <form method="POST" action="." style="width: 100%;">
                    {% csrf_token %}
                    {{ form.as_p }}
                    <button type="submit" class="btn-primary" style="width: 100%; margin-top: 15px;">Update Password</button>
                </form>
            {% endif %}
        </div>
    </div>
</body>
</html>
