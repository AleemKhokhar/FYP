{% load static %}
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Email Sent - GamerTracker</title>
    <link rel="stylesheet" href="{% static 'css/style.css' %}?v=1.1">
</head>
<body>
    <nav class="navbar">
        <div class="nav-container">
            <a href="{% url 'home' %}" class="logo">Gamer<span>Tracker</span></a>
        </div>
    </nav>

    <div class="container" style="display: flex; justify-content: center; align-items: center; min-height: 80vh;">
        <div class="hero-section" style="max-width: 450px; width: 100%; padding: 50px 40px; text-align: center;">
            <h1 style="margin-bottom: 10px;">Check <span>Inbox</span></h1>
            <p style="color: var(--text-dim); margin-bottom: 30px;">We have sent a secure link to your email. Click it to reset your password.</p>
            
            <div class="signup-link-wrapper" style="border-top: none; padding-top: 0;">
                <a href="{% url 'login' %}" class="signup-link">
                    <span>Return to Login</span>
                </a>
            </div>
        </div>
    </div>
</body>
</html>
