{% load static %}
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Reset Password - GamerTracker</title>
    <link rel="stylesheet" href="{% static 'css/style.css' %}?v=1.1">
</head>
<body>
    <nav class="navbar">
        <div class="nav-container">
            <a href="{% url 'home' %}" class="logo">Gamer<span>Tracker</span></a>
        </div>
    </nav>

    <div class="container" style="display: flex; justify-content: center; align-items: center; min-height: 80vh;">
        <div class="hero-section" style="max-width: 450px; width: 100%; padding: 50px 40px;">
            <h1 style="margin-bottom: 10px;">Reset <span>Password</span></h1>
            <p style="color: var(--text-dim); margin-bottom: 30px;">Enter your email to receive a reset link.</p>
            
            <form method="POST" action="{% url 'account_reset_password' %}" style="width: 100%;">
                {% csrf_token %}
                <input type="email" name="email" placeholder="Enter your email address" required style="margin-bottom: 25px;" />
                <button type="submit" class="btn-primary" style="width: 100%;">Send Reset Link</button>
            </form>
            
            <div class="signup-link-wrapper">
                <a href="{% url 'login' %}" class="signup-link">
                    Remembered it? <span>Back to Login</span>
                </a>
            </div>
        </div>
    </div>
</body>
</html>
