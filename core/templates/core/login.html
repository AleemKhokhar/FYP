{% load static %}
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Login - GamerTracker</title>
    <link rel="stylesheet" href="{% static 'css/style.css' %}?v=1.1">
    <style>
        .signup-link-wrapper {
            margin-top: 25px;
            padding-top: 20px;
            border-top: 1px solid rgba(255, 255, 255, 0.1);
            width: 100%;
        }

        .signup-link {
            color: rgba(255, 255, 255, 0.6);
            text-decoration: none;
            font-size: 0.85rem;
            transition: all 0.3s ease;
            letter-spacing: 0.5px;
        }

        .signup-link span {
            color: var(--accent);
            font-weight: 800;
            text-transform: uppercase;
            margin-left: 5px;
        }

        .signup-link:hover {
            color: white;
        }

        .signup-link:hover span {
            text-shadow: 0 0 10px var(--accent-glow);
        }
    </style>
</head>
<body>
    <nav class="navbar">
        <div class="nav-container">
            <a href="{% url 'home' %}" class="logo">Gamer<span>Tracker</span></a>
            <div class="nav-links">
                <a href="{% url 'login' %}" style="color: var(--accent) !important;">Login</a>
                <a href="{% url 'signup' %}">Sign Up</a>
            </div>
        </div>
    </nav>

    <div class="container" style="display: flex; justify-content: center; align-items: center; min-height: 80vh;">
        <div class="hero-section" style="max-width: 450px; width: 100%; padding: 50px 40px;">
            <h1 style="margin-bottom: 10px;">Login</h1>
            <p style="color: var(--text-dim); margin-bottom: 30px;">Access your neural gaming profile</p>
            
            <form method="POST" action="" style="width: 100%;">
                {% csrf_token %}
                <input type="text" name="username" placeholder="Username" required style="margin-bottom: 15px;" />
                <input type="password" name="password" placeholder="Password" required style="margin-bottom: 25px;" />
                <button type="submit" class="btn-primary" style="width: 100%;">Authorize Access</button>
            </form>
            <div class="signup-link-wrapper" style="margin-top: 15px; border-top: none; padding-top: 0;">
              <a href="{% url 'account_reset_password' %}" class="signup-link" style="font-size: 0.75rem;">
                  Forgot your password? <span>Reset it</span>
              </a>
            </div>
            <div class="signup-link-wrapper">
                <a href="{% url 'signup' %}" class="signup-link">
                    Don't have an account? <span>Sign up</span>
                </a>
            </div>
        </div>
    </div>
</body>
</html>
