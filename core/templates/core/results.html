<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>{{ username }} - Stats View</title>
    <style>
        /* The "Gaming Dark Mode" Theme */
        :root {
            --bg-color: #121212;
            --card-bg: #1e1e1e;
            --accent: #00ff88; /* Neon Green */
            --text-secondary: #aaaaaa;
        }
        body {
            background-color: var(--bg-color);
            color: white;
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            margin: 0;
            padding: 20px;
        }
        .container { max-width: 900px; margin: 0 auto; }
        
        /* Header styling */
        .header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 30px;
            padding-bottom: 20px;
            border-bottom: 1px solid #333;
        }
        .header h1 { margin: 0; font-size: 2.5rem; }
        .platform-tag {
            background: #333;
            color: var(--accent);
            padding: 5px 12px;
            border-radius: 20px;
            font-size: 1rem;
            vertical-align: middle;
        }
        .back-btn {
            color: var(--text-secondary);
            text-decoration: none;
            font-weight: bold;
            padding: 10px 20px;
            border: 1px solid #333;
            border-radius: 5px;
            transition: all 0.3s ease;
        }
        .back-btn:hover { background: var(--accent); color: black; border-color: var(--accent); }

        /* The Hero Stat Card (Time Played) */
        .hero-card {
            background: linear-gradient(145deg, #1e1e1e, #252525);
            padding: 40px;
            border-radius: 15px;
            text-align: center;
            margin-bottom: 30px;
            border: 2px solid var(--accent);
            box-shadow: 0 0 25px rgba(0, 255, 136, 0.15);
        }
        .hero-card h2 { color: var(--text-secondary); margin: 0 0 10px 0; text-transform: uppercase; letter-spacing: 2px; font-size: 1rem;}
        .big-stat { font-size: 5rem; font-weight: 800; color: var(--accent); margin: 0; line-height: 1; }
        .stat-unit { font-size: 2rem; color: var(--text-secondary); }

        /* Grid for the rest of the stats */
        .stats-grid {
            display: grid;
            grid-template-columns: repeat(auto-fill, minmax(200px, 1fr));
            gap: 20px;
        }
        .stat-card {
            background: var(--card-bg);
            padding: 25px;
            border-radius: 10px;
            border: 1px solid #333;
            transition: transform 0.3s ease;
        }
        .stat-card:hover { transform: translateY(-5px); border-color: var(--accent); }
        .stat-label { color: var(--text-secondary); display: block; margin-bottom: 10px; text-transform: uppercase; font-size: 0.9rem; letter-spacing: 1px;}
        .stat-value { font-size: 1.8rem; font-weight: bold; }
    </style>
</head>
<body>
    <div class="container">
        <div class="header">
            <h1>
                {{ username }} 
                <span class="platform-tag">{{ platform|upper }}</span>
            </h1>
            <a href="{% url 'home' %}" class="back-btn">← Search Again</a>
        </div>

        <div class="hero-card">
            <h2>Total Time Played</h2>
            <div class="big-stat">
                {% widthratio time_played 60 1 %}
                <span class="stat-unit">Hours</span>
            </div>
        </div>

        <div class="stats-grid">
            {% for stat in all_stats %}
                {% if stat.key != 'minutesPlayed' and stat.key != 'lastModified' %}
                <div class="stat-card">
                    <span class="stat-label">{{ stat.key }}</span>
                    <span class="stat-value">{{ stat.value }}</span>
                </div>
                {% endif %}
            {% endfor %}
        </div>
    </div>
</body>
</html>
